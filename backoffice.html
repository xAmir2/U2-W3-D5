<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backoffice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./Css/style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-secondary">
    <header>
      <nav class="navbar navbar-expand-lg bg-primary sticky-top">
        <div class="container-fluid">
          <a class="navbar-brand text-light fw-bold fs-4" href="#"
            ><img
              src="./Assets/logo store.png"
              alt="logo"
              width="100px"
              height="50px"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a
                  class="nav-link active text-light fs-5"
                  aria-current="page"
                  href="./homepage.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light fs-5" href="./backoffice.html"
                  >Backoffice</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <section class="text-center my-3 text-light">
        <h1>What product are we selling today? :&#41;</h1>
      </section>
      <div class="container">
        <div class="row justify-content-center my-5">
          <div class="col-12 col-md-6 text-light">
            <form id="product-form">
              <div class="mb-3">
                <label for="name" class="form-label">Products name</label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="mb-3">
                <label for="description" class="form-label"
                  >Product's description</label
                >
                <textarea
                  type="text"
                  class="form-control"
                  id="description"
                  rows="2"
                  required
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="brand" class="form-label">Brand</label>
                <input type="text" class="form-control" id="brand" required />
              </div>
              <div class="mb-3">
                <label for="imgUrl" class="form-label">Product Image url</label>
                <input type="text" class="form-control" id="imgUrl" required />
              </div>
              <div class="mb-3">
                <label for="price" class="form-label">Product's price</label>
                <input type="number" class="form-control" id="price" required />
              </div>
              <div class="d-flex justify-content-evenly">
                <button type="submit" class="btn btn-success px-5">Save</button>
                <button
                  type="submit"
                  class="btn btn-primary px-5"
                  id="formReset"
                >
                  Reset
                </button>
                <button
                  type="submit"
                  class="btn btn-danger px-5"
                  id="productDelete"
                >
                  Delete
                </button>
              </div>
              <div class="modal fade" id="deleteModal" tabindex="-1">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title">Confirm Delete</h5>
                      <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                      ></button>
                    </div>

                    <div class="modal-body">
                      Are you sure you want to delete this product?
                    </div>

                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                      >
                        Cancel
                      </button>

                      <button
                        type="button"
                        class="btn btn-danger"
                        id="confirmDeleteBtn"
                      >
                        Delete
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="modal fade" id="resetModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Confirm Reset</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>

            <div class="modal-body">
              Are you sure you want to reset the form? All data will be lost.
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>

              <button
                type="button"
                class="btn btn-warning"
                id="confirmResetBtn"
              >
                Reset
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-primary">
      <div class="container">
        <div class="row justify-content-around">
          <div class="col-12 col-md-6 text-center">
            <p class="text-light fs-5 mt-3">
              &copy; Amir - Graphics Retail - <span id="date"></span>
            </p>
          </div>
        </div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./Scripts/backoffice.js"></script>
  </body>
</html>
